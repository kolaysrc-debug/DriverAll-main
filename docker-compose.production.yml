version: "3.8"

services:
  # ── MongoDB ──
  mongodb:
    image: mongo:6
    container_name: driverall-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-driver}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-driverpass}
    volumes:
      - mongo_data:/data/db
    networks:
      - driverall

  # ── Backend (Express.js) ──
  backend:
    build:
      context: ./drivercv-backend
      dockerfile: Dockerfile
    container_name: driverall-backend
    restart: always
    expose:
      - "3001"
    env_file:
      - ./drivercv-backend/.env
    environment:
      MONGO_URI: mongodb://${MONGO_USER:-driver}:${MONGO_PASS:-driverpass}@mongodb:27017/driverall?authSource=admin
      PORT: 3001
      NODE_ENV: production
    depends_on:
      - mongodb
    volumes:
      - uploads_data:/app/uploads/runtime
    networks:
      - driverall

  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ./drivercv-frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: http://backend:3001
        NEXT_PUBLIC_API_URL: http://backend:3001
    container_name: driverall-frontend
    restart: always
    expose:
      - "3000"
    environment:
      INTERNAL_API_URL: http://backend:3001
      NEXT_PUBLIC_API_URL: http://backend:3001
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - driverall

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: driverall-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - driverall

volumes:
  mongo_data:
  uploads_data:

networks:
  driverall:
    driver: bridge
