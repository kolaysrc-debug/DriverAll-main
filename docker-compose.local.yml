# Yerel tam yığın: TLS yok, http://localhost:8080
# Kullanım: docker compose -f docker-compose.local.yml up --build -d
version: "3.8"

services:
  mongodb:
    image: mongo:6
    container_name: driverall-mongo-local
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-driver}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-driverpass}
    volumes:
      - mongo_data_local:/data/db
    networks:
      - driverall_local

  backend:
    build:
      context: ./drivercv-backend
      dockerfile: Dockerfile
    container_name: driverall-backend-local
    restart: unless-stopped
    env_file:
      - ./drivercv-backend/.env
    expose:
      - "3001"
    environment:
      MONGO_URI: mongodb://${MONGO_USER:-driver}:${MONGO_PASS:-driverpass}@mongodb:27017/driverall?authSource=admin
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-local-docker-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,http://127.0.0.1:8080}
    depends_on:
      - mongodb
    volumes:
      - uploads_data_local:/app/uploads/runtime
    networks:
      - driverall_local

  frontend:
    build:
      context: ./drivercv-frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: http://backend:3001
        NEXT_PUBLIC_API_URL: ""
    container_name: driverall-frontend-local
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      INTERNAL_API_URL: http://backend:3001
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - driverall_local

  nginx:
    image: nginx:alpine
    container_name: driverall-nginx-local
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - driverall_local

volumes:
  mongo_data_local:
  uploads_data_local:

networks:
  driverall_local:
    driver: bridge
